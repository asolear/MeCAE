<svg width="300px" height="200px" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <title>Logo de Eficiencia Energética</title>
  <desc>Un logo simple que representa la eficiencia energética con una bombilla y un símbolo de euro.</desc>

  <circle cx="150" cy="100" r="50" fill="#FFFF00" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="50" x2="150" y2="150" stroke="#333" stroke-width="2"/>

  <text x="150" y="180" text-anchor="middle" font-size="36" fill="#000">€</text>

  <rect x="0" y="0" width="300" height="200" fill="#F0F0F0"/>
</svg>